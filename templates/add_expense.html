{% extends "base.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fas fa-plus-circle" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 class="mt-3">Add New Expense</h2>
                <p class="text-muted">Track your spending and manage your budget</p>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="amount" class="form-label">
                        <i class="fas fa-dollar-sign me-1"></i>Amount
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" 
                               placeholder="0.00" required autofocus>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="category" class="form-label">
                        <i class="fas fa-tag me-1"></i>Category
                    </label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Food">🍔 Food & Dining</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">📄 Bills & Utilities</option>
                        <option value="Health">💊 Health</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="note" class="form-label">
                        <i class="fas fa-sticky-note me-1"></i>Note (Optional)
                    </label>
                    <textarea class="form-control" id="note" name="note" rows="2" 
                              placeholder="Add any additional details..."></textarea>
                </div>
                
                <div class="mb-4">
                    <label for="date" class="form-label">
                        <i class="fas fa-calendar me-1"></i>Date
                    </label>
                    <input type="date" class="form-control" id="date" name="date" 
                           value="{{ datetime.now().strftime('%Y-%m-%d') }}">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-custom btn-lg">
                        <i class="fas fa-save me-2"></i>Save Expense
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
